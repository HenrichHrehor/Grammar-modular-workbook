<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Present Simple — Practice (Protected answers)</title>
  <link rel="stylesheet" href="assets/css/workbook.css">
</head>
<body data-exercise-page="standard">

<div class="sheet">

  <div class="nav-bar">
    <div class="nav-links">
      <a href="present-simple-contents.html" class="nav-btn">📖 Contents</a>
      <a href="present-simple-grammar.html" class="nav-btn">📚 Grammar</a>
      <a href="present-simple-exercises.html" class="nav-btn">✏️ Exercises</a>
      <a href="present-simple-exercises-v2.html" class="nav-btn">🔄 Set B</a>
      <a href="present-simple-b1.html" class="nav-btn">🎯 B1</a>
      <a href="present-simple-b2.html" class="nav-btn">🚀 B2</a>
    </div>
    <div class="nav-right">
      <button type="button" class="check-btn" onclick="checkExercises()">✔️ Check</button>
      <button type="button" class="new-set-btn" onclick="buildNewWorksheet()">🔄 New set</button>
      <button type="button" class="answers-btn" onclick="toggleAnswers()">✅ Answers</button>
      <button type="button" class="print-btn" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>

  <div class="top-bar">
    <div class="student-info">
      <div><strong>Student:</strong></div>
      <div><strong>Date:</strong> <input type="date" class="date-input" aria-label="Worksheet date"></div>
    </div>
    <div class="page-tag">🔒 Protected — Check works; answer key needs password</div>
  </div>

  <h1>Present Simple Exercises</h1>
  <p class="subtitle">Practice forms — students can <strong>Check</strong> answers; teachers unlock the full answer key with a password</p>

  <div id="checkResult" class="check-result" hidden></div>

  <div id="exerciseSections"></div>

  <div id="answerKey" class="answer-key"></div>

</div>

<script src="assets/js/exercise-pool-present-simple.js"></script>
<script src="assets/js/exercise-engine.js"></script>
<script src="assets/js/workbook.js"></script>
<script>
(function () {
  var TEACHER_KEY = "teacher123";
  window.toggleAnswers = function () {
    var answers = document.getElementById("answerKey");
    if (!answers) return;
    if (answers.classList.contains("active")) {
      answers.classList.remove("active");
      return;
    }
    if (sessionStorage.getItem("grammar_wb_unlock") === "1") {
      answers.classList.add("active");
      return;
    }
    var input = window.prompt("Teacher password to show answers:");
    if (input === TEACHER_KEY) {
      sessionStorage.setItem("grammar_wb_unlock", "1");
      answers.classList.add("active");
    } else {
      window.alert("Incorrect password.");
    }
  };
})();
</script>
</body>
</html>
